<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#080a10">
    <title>School Tools</title>
    <script>
      (function () {
        var phone = window.matchMedia("(max-width: 820px), (pointer: coarse) and (max-width: 980px)").matches;
        window.location.replace((phone ? "mobile.html" : "desktop.html") + (window.location.hash || "#/"));
      })();
    </script>
  </head>
  <body>
    <p><a href="desktop.html#/">Desktop oeffnen</a> &middot; <a href="mobile.html#/">Smartphone oeffnen</a></p>
  </body>
</html>
